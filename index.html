<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physical Security Dashboard</title>
    <!-- jsPDF & html2canvas for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f4f8;
            color: #1a2332;
            padding: 20px;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #e9ecf0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b0b8c5;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8f9aab;
        }

        .app {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ---------- HEADER ---------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            background: #ffffff;
            padding: 20px 28px;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 span {
            background: #1a3a6b;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            padding: 2px 14px;
            border-radius: 40px;
        }
        .header-meta {
            font-size: 14px;
            color: #5e6f88;
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .header-meta .badge {
            background: #eef2f7;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
            color: #1a3a6b;
        }

        /* ---------- STATS ROW ---------- */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border-left: 4px solid #1a3a6b;
        }
        .stat-card .label {
            font-size: 13px;
            font-weight: 500;
            color: #6b7d98;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
            color: #0f1a2e;
        }
        .stat-card:nth-child(2) {
            border-left-color: #2d7a5a;
        }
        .stat-card:nth-child(3) {
            border-left-color: #b45a2a;
        }
        .stat-card:nth-child(4) {
            border-left-color: #8a4a8a;
        }
        .stat-card:nth-child(5) {
            border-left-color: #2a6b8a;
        }

        /* ---------- FILTERS ---------- */
        .filters {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 14px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 130px;
            flex: 1 0 auto;
        }
        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            color: #5a6f8a;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 1.5px solid #dce2ea;
            border-radius: 10px;
            font-size: 14px;
            background: #fafcfe;
            color: #1a2332;
            outline: none;
            transition: 0.2s;
            width: 100%;
            min-width: 120px;
        }
        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #1a3a6b;
            box-shadow: 0 0 0 3px rgba(26, 58, 107, 0.12);
        }
        .filter-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 22px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            background: #e9edf3;
            color: #1a2332;
            white-space: nowrap;
        }
        .btn-primary {
            background: #1a3a6b;
            color: #fff;
        }
        .btn-primary:hover {
            background: #0f2a4f;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 58, 107, 0.25);
        }
        .btn-success {
            background: #1f7b4a;
            color: #fff;
        }
        .btn-success:hover {
            background: #16633a;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #dce2ea;
        }
        .btn-outline:hover {
            background: #f0f4fa;
        }
        .btn-sm {
            padding: 5px 14px;
            font-size: 12px;
        }
        .btn-pdf {
            background: #c0392b;
            color: #fff;
        }
        .btn-pdf:hover {
            background: #a93226;
        }

        /* ---------- VIEW TOGGLE ---------- */
        .view-toggle {
            display: flex;
            gap: 6px;
            background: #eef2f7;
            padding: 4px;
            border-radius: 12px;
        }
        .view-toggle button {
            padding: 6px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            background: transparent;
            color: #5a6f8a;
            transition: 0.2s;
        }
        .view-toggle button.active {
            background: #ffffff;
            color: #1a3a6b;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .view-toggle button:hover:not(.active) {
            color: #1a2332;
        }

        /* ---------- GROUPED (TREE) VIEW ---------- */
        .grouped-view {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }
        .group-node {
            margin-bottom: 4px;
        }
        .group-node .node-header {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            background: #f8faff;
            border-left: 4px solid #1a3a6b;
        }
        .group-node .node-header:hover {
            background: #eef4fa;
        }
        .group-node .node-header .icon {
            margin-right: 10px;
            font-size: 16px;
        }
        .group-node .node-header .label {
            font-weight: 600;
            flex: 1;
        }
        .group-node .node-header .count {
            background: #dce4ed;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #1a3a6b;
        }
        .group-node .node-children {
            margin-left: 24px;
            border-left: 2px dashed #dce2ea;
            padding-left: 12px;
        }
        .group-node .node-children .node-header {
            border-left-color: #6b8ba8;
        }
        .group-node .node-children .node-children .node-header {
            border-left-color: #9ab0c4;
        }
        .group-node .leaf-list {
            margin-left: 24px;
            padding-left: 12px;
            border-left: 2px dashed #dce2ea;
        }
        .leaf-item {
            padding: 6px 12px;
            border-bottom: 1px solid #f0f4fa;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .leaf-item .detail {
            color: #5a6f8a;
            font-size: 13px;
        }
        .group-node .node-header .expand-btn {
            margin-left: 8px;
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            color: #6b7d98;
        }

        /* ---------- TABLE VIEW ---------- */
        .table-wrap {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }
        .table-scroll {
            overflow-x: auto;
            padding: 0 4px 4px 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead {
            background: #f7f9fc;
            border-bottom: 2px solid #e2e8f0;
        }
        th {
            text-align: left;
            padding: 14px 16px;
            font-weight: 600;
            color: #3d5068;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #edf1f7;
            vertical-align: middle;
        }
        tr:hover td {
            background: #f8faff;
        }
        .clickable {
            cursor: pointer;
        }
        .clickable:hover {
            background: #f0f5ff !important;
        }
        .badge-status {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-status.issued {
            background: #d6eaf8;
            color: #1a5276;
        }
        .badge-status.returned {
            background: #d5f5e3;
            color: #1a6a3a;
        }
        .badge-status.notreturned {
            background: #fdebd0;
            color: #9e6d1a;
        }
        .badge-status.closed {
            background: #e8daef;
            color: #6c3483;
        }
        .badge-status.in {
            background: #dff0e6;
            color: #1a6a3a;
        }
        .badge-status.out {
            background: #fce8e6;
            color: #a93226;
        }

        /* ---------- MODAL ---------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 18, 32, 0.55);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: #ffffff;
            border-radius: 24px;
            max-width: 760px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.25s ease;
        }
        .modal-header {
            padding: 20px 28px;
            border-bottom: 1.5px solid #edf1f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }
        .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #6b7d98;
            padding: 0 6px;
            line-height: 1;
        }
        .modal-header .close-btn:hover {
            color: #1a2332;
        }
        .modal-body {
            padding: 24px 28px 28px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-body .detail-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #f0f4fa;
        }
        .modal-body .detail-row .label {
            font-weight: 600;
            width: 140px;
            flex-shrink: 0;
            color: #3d5068;
        }
        .modal-body .detail-row .value {
            color: #0f1a2e;
            word-break: break-word;
        }
        .modal-footer {
            padding: 16px 28px 24px;
            border-top: 1.5px solid #edf1f7;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            flex-shrink: 0;
        }

        /* ---------- EMPTY STATE ---------- */
        .empty-state {
            padding: 48px 20px;
            text-align: center;
            color: #6b7d98;
        }
        .empty-state .big-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state h3 {
            font-size: 18px;
            color: #1a2332;
            margin-bottom: 4px;
        }

        /* ---------- ANIMATIONS ---------- */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                padding: 16px 20px;
            }
            .header h1 {
                font-size: 20px;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
                padding: 16px 18px;
            }
            .filter-group {
                min-width: unset;
            }
            .filter-actions {
                justify-content: stretch;
            }
            .filter-actions .btn {
                flex: 1;
                text-align: center;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .modal {
                max-width: 100%;
                max-height: 95vh;
                border-radius: 16px;
            }
            .modal-body .detail-row {
                flex-direction: column;
                padding: 10px 0;
            }
            .modal-body .detail-row .label {
                width: 100%;
                margin-bottom: 2px;
            }
            .table-scroll table {
                font-size: 13px;
            }
            th,
            td {
                padding: 10px 12px;
            }
            .view-toggle button {
                padding: 5px 12px;
                font-size: 12px;
            }
            .group-node .node-children {
                margin-left: 12px;
                padding-left: 8px;
            }
            .leaf-list {
                margin-left: 12px !important;
                padding-left: 8px !important;
            }
        }
        @media print {
            .no-print {
                display: none !important;
            }
            .modal-overlay {
                position: static !important;
                background: none !important;
                backdrop-filter: none !important;
                padding: 0 !important;
                display: flex !important;
            }
            .modal {
                max-height: none !important;
                box-shadow: none !important;
                border: 1px solid #ddd;
            }
            .modal-footer {
                display: none !important;
            }
            .modal-header .close-btn {
                display: none !important;
            }
            body {
                padding: 10px;
                background: #fff;
            }
            .header,
            .filters,
            .stats,
            .table-wrap,
            .grouped-view {
                box-shadow: none !important;
                border: 1px solid #e2e8f0;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- HEADER -->
        <header class="header no-print">
            <h1>🔐 Physical Security <span>Dashboard</span></h1>
            <div class="header-meta">
                <span class="badge">🕒 3 Shifts</span>
                <span class="badge">📍 3 Beats</span>
                <span class="badge" id="reportCount">0 Records</span>
            </div>
        </header>

        <!-- STATS -->
        <section class="stats no-print" id="statsRow">
            <div class="stat-card"><div class="label">Total Records</div><div class="value" id="statTotal">0</div></div>
            <div class="stat-card"><div class="label">Passes Issued</div><div class="value" id="statPassIssued">0</div></div>
            <div class="stat-card"><div class="label">Visitors</div><div class="value" id="statVisitors">0</div></div>
            <div class="stat-card"><div class="label">Staff Check‑Ins</div><div class="value" id="statStaffIn">0</div></div>
            <div class="stat-card"><div class="label">Incidents</div><div class="value" id="statIncidents">0</div></div>
        </section>

        <!-- FILTERS -->
        <section class="filters no-print">
            <div class="filter-group">
                <label>Report Type</label>
                <select id="reportType">
                    <option value="passes">Passes (Changing Room)</option>
                    <option value="visitors">Visitors (Manager's Entrance)</option>
                    <option value="staff">Staff Check‑In/Out</option>
                    <option value="incidents">Incidents & Relief</option>
                    <option value="all" selected>All Combined</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Shift</label>
                <select id="filterShift">
                    <option value="">All Shifts</option>
                    <option value="Morning">Morning (7‑2)</option>
                    <option value="Afternoon">Afternoon (2‑9)</option>
                    <option value="Night">Night (9‑7)</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Location</label>
                <select id="filterLocation">
                    <option value="">All Locations</option>
                    <option value="Manager's Entrance">Manager's Entrance</option>
                    <option value="Changing Room Beat">Changing Room Beat</option>
                    <option value="Gate House">Gate House</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Location</label>
                <select id="filterLocation">
                    <option value="">All Locations</option>
                    <option value="Manager's Entrance">Manager's Entrance</option>
                    <option value="Changing Room Beat">Changing Room Beat</option>
                    <option value="Gate House">Gate House</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Department</label>
                <select id="filterDepartment">
                    <option value="">All Departments</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Date From</label>
                <input type="date" id="filterDateFrom" />
            </div>
            <div class="filter-group">
                <label>Date To</label>
                <input type="date" id="filterDateTo" />
            </div>
            <div class="filter-actions">
                <button class="btn btn-primary" id="applyFilters">Apply</button>
                <button class="btn btn-outline" id="resetFilters">Reset</button>
            </div>
        </section>

        <!-- VIEW TOGGLE -->
        <div class="no-print" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px;">
            <div class="view-toggle">
                <button class="active" data-view="grouped">📊 Grouped</button>
                <button data-view="table">📋 Table</button>
            </div>
            <button class="btn btn-pdf btn-sm no-print" id="exportPdfAll">📄 Export All PDF</button>
        </div>

        <!-- GROUPED VIEW -->
        <div id="groupedContainer" class="grouped-view"></div>

        <!-- TABLE VIEW -->
        <div id="tableContainer" class="table-wrap" style="display:none;">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Type</th>
                            <th>Staff/Visitor</th>
                            <th>Department</th>
                            <th>Location</th>
                            <th>Shift</th>
                            <th>Date / Time</th>
                            <th>Status</th>
                            <th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="tableEmpty" class="empty-state" style="display:none;">
                <div class="big-icon">📭</div>
                <h3>No records match your filters</h3>
                <p>Try adjusting the filters above.</p>
            </div>
        </div>

        <!-- MODAL -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="modalTitle">Record Details</h2>
                    <button class="close-btn" id="modalClose">&times;</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer no-print">
                    <button class="btn btn-outline" id="modalCloseBtn">Close</button>
                    <button class="btn btn-pdf" id="modalPdfBtn">📄 PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1.  DATA MODEL & SAMPLE GENERATION
        // ============================================================

        // Shifts with time ranges
        const SHIFTS = [
            { name: 'Morning', start: 7, end: 14 },
            { name: 'Afternoon', start: 14, end: 21 },
            { name: 'Night', start: 21, end: 7 } // end next day
        ];

        // Departments & Units (from SQL schema)
        const DEPARTMENTS = [
            { id: 1, name: 'Security' },
            { id: 2, name: 'HR' },
            { id: 3, name: 'Finance' },
            { id: 4, name: 'IT' },
            { id: 5, name: 'Operations' },
            { id: 6, name: 'Medical' },
            { id: 7, name: 'Canteen' },
            { id: 8, name: 'Procurement' },
            { id: 9, name: 'Inventory' },
            { id: 10, name: 'Internal Audit' },
        ];
        const UNITS = {
            1: ['Patrol', 'Control Room', 'Gate House'],
            2: ['Recruitment', 'Payroll'],
            3: ['Accounts', 'Budget'],
            4: ['Infrastructure', 'Support'],
            5: ['Planning', 'Logistics'],
            6: ['Clinic', 'First Aid'],
            7: ['Kitchen', 'Service'],
            8: ['Purchasing'],
            9: ['Warehouse'],
            10: ['Compliance'],
        };

        // Staff profiles (matching SQL Profiles table)
        function generateStaff() {
            const staff = [];
            const firstNames = ['Ade', 'Bisi', 'Chidi', 'Damilola', 'Emeka', 'Funmi', 'Gbenga', 'Hauwa', 'Ifeanyi', 'Joy',
                'Kunle', 'Lola', 'Musa', 'Ngozi', 'Ola', 'Paul', 'Queen', 'Rahman', 'Sade', 'Tunde', 'Uche', 'Victor',
                'Wale', 'Xavier', 'Yemi', 'Zainab'
            ];
            const lastNames = ['Ogun', 'Adelaja', 'Okonkwo', 'Adebayo', 'Nwosu', 'Ola', 'Akin', 'Bello', 'Okafor', 'Eze',
                'Bamidele', 'Fashina', 'Abdullahi', 'Ibe', 'Oladipo', 'Okoro', 'Uche', 'Yusuf', 'Adeniyi', 'Balogun',
                'Okonkwo', 'Adeyemi', 'Oluwaseun', 'Okafor', 'Bamidele', 'Adebayo'
            ];
            const roles = ['Manager', 'Supervisor', 'Officer', 'Assistant'];
            for (let i = 0; i < 40; i++) {
                const dept = DEPARTMENTS[i % DEPARTMENTS.length];
                const unitList = UNITS[dept.id] || ['General'];
                const unit = unitList[i % unitList.length];
                const role = roles[i % roles.length];
                const staffId = 'S' + String(i + 1).padStart(3, '0');
                staff.push({
                    staffId,
                    firstName: firstNames[i % firstNames.length],
                    lastName: lastNames[i % lastNames.length],
                    department: dept.name,
                    departmentId: dept.id,
                    unit: unit,
                    role: role,
                    location: ['Manager\'s Entrance', 'Changing Room Beat', 'Gate House'][i % 3],
                });
            }
            return staff;
        }

        const STAFF = generateStaff();

        // Helper functions
        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function pick(arr) { return arr[rand(0, arr.length - 1)]; }

        function pad(n) { return String(n).padStart(2, '0'); }

        function randomDate(from, to) {
            return new Date(from.getTime() + Math.random() * (to.getTime() - from.getTime()));
        }

        function formatDate(d) {
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
        }

        function formatTime(d) {
            return pad(d.getHours()) + ':' + pad(d.getMinutes());
        }

        function formatDateTime(d) {
            return formatDate(d) + ' ' + formatTime(d);
        }

        function getShiftForTime(hours) {
            if (hours >= 7 && hours < 14) return 'Morning';
            if (hours >= 14 && hours < 21) return 'Afternoon';
            return 'Night';
        }

        function getShiftNameForDate(date) {
            return getShiftForTime(date.getHours());
        }

        // Generate records of different types
        function generateRecords(count) {
            const records = [];
            const start = new Date();
            start.setDate(start.getDate() - 60);
            const end = new Date();

            // Helper to pick a staff
            const getStaff = () => pick(STAFF);

            // 1. Passes (only at Changing Room Beat)
            const passStatuses = ['issued', 'returned', 'notreturned', 'closed'];
            for (let i = 0; i < Math.floor(count * 0.3); i++) {
                const staff = getStaff();
                const date = randomDate(start, end);
                const shift = getShiftNameForDate(date);
                const status = pick(passStatuses);
                records.push({
                    id: 'P' + String(i + 1).padStart(4, '0'),
                    type: 'pass',
                    staffId: staff.staffId,
                    staffName: staff.firstName + ' ' + staff.lastName,
                    department: staff.department,
                    unit: staff.unit,
                    location: 'Changing Room Beat',
                    shift: shift,
                    date: formatDate(date),
                    time: formatTime(date),
                    dateTime: formatDateTime(date),
                    status: status,
                    details: {
                        passType: pick(['Internal', 'External']),
                        issuedBy: pick(STAFF).staffId,
                        returnedDate: status === 'returned' ? formatDateTime(new Date(date.getTime() + rand(3600000,
                            7200000))) : null,
                        closedDate: status === 'closed' ? formatDateTime(new Date(date.getTime() + rand(7200000,
                            14400000))) : null,
                    }
                });
            }

            // 2. Visitors (only at Manager's Entrance)
            for (let i = 0; i < Math.floor(count * 0.25); i++) {
                const dept = pick(DEPARTMENTS);
                const visitorName = 'Visitor ' + pick(['A', 'B', 'C', 'D', 'E']) + rand(10, 99);
                const date = randomDate(start, end);
                const shift = getShiftNameForDate(date);
                const checkIn = new Date(date);
                checkIn.setHours(rand(8, 12), rand(0, 59), 0);
                const checkOut = new Date(checkIn);
                checkOut.setHours(checkIn.getHours() + rand(1, 4), rand(0, 59), 0);
                records.push({
                    id: 'V' + String(i + 1).padStart(4, '0'),
                    type: 'visitor',
                    staffId: null,
                    staffName: visitorName,
                    department: dept.name,
                    unit: 'Visitor',
                    location: 'Manager\'s Entrance',
                    shift: shift,
                    date: formatDate(checkIn),
                    time: formatTime(checkIn),
                    dateTime: formatDateTime(checkIn),
                    status: 'checked-in',
                    details: {
                        checkInTime: formatDateTime(checkIn),
                        checkOutTime: formatDateTime(checkOut),
                        purpose: pick(['Meeting', 'Interview', 'Delivery', 'Inspection']),
                        host: pick(STAFF).staffId,
                    }
                });
            }

            // 3. Staff Check-In/Out (both Manager's Entrance and Changing Room Beat)
            for (let i = 0; i < Math.floor(count * 0.3); i++) {
                const staff = getStaff();
                const loc = pick(['Manager\'s Entrance', 'Changing Room Beat']);
                const date = randomDate(start, end);
                const shift = getShiftNameForDate(date);
                const activity = pick(['Check-In', 'Check-Out']);
                const checkTime = new Date(date);
                if (activity === 'Check-In') {
                    checkTime.setHours(rand(7, 12), rand(0, 59), 0);
                } else {
                    checkTime.setHours(rand(13, 18), rand(0, 59), 0);
                }
                records.push({
                    id: 'S' + String(i + 1).padStart(4, '0'),
                    type: 'staff',
                    staffId: staff.staffId,
                    staffName: staff.firstName + ' ' + staff.lastName,
                    department: staff.department,
                    unit: staff.unit,
                    location: loc,
                    shift: shift,
                    date: formatDate(checkTime),
                    time: formatTime(checkTime),
                    dateTime: formatDateTime(checkTime),
                    status: activity === 'Check-In' ? 'in' : 'out',
                    details: {
                        activity: activity,
                        checkedBy: pick(STAFF).staffId,
                    }
                });
            }

            // 4. Incidents & Relief (both Manager's Entrance and Changing Room Beat)
            for (let i = 0; i < Math.floor(count * 0.15); i++) {
                const loc = pick(['Manager\'s Entrance', 'Changing Room Beat']);
                const date = randomDate(start, end);
                const shift = getShiftNameForDate(date);
                const incidentTime = new Date(date);
                incidentTime.setHours(rand(8, 20), rand(0, 59), 0);
                const reliefStart = new Date(incidentTime);
                reliefStart.setMinutes(reliefStart.getMinutes() + rand(10, 30));
                const reliefEnd = new Date(reliefStart);
                reliefEnd.setMinutes(reliefEnd.getMinutes() + rand(10, 30));
                const staff = getStaff();
                records.push({
                    id: 'I' + String(i + 1).padStart(4, '0'),
                    type: 'incident',
                    staffId: staff.staffId,
                    staffName: staff.firstName + ' ' + staff.lastName,
                    department: staff.department,
                    unit: staff.unit,
                    location: loc,
                    shift: shift,
                    date: formatDate(incidentTime),
                    time: formatTime(incidentTime),
                    dateTime: formatDateTime(incidentTime),
                    status: 'reported',
                    details: {
                        incidentType: pick(['Security breach', 'Medical', 'Fire', 'Dispute', 'Equipment failure']),
                        incidentTime: formatDateTime(incidentTime),
                        reliefOfficer: pick(STAFF).staffId,
                        reliefStart: formatDateTime(reliefStart),
                        reliefEnd: formatDateTime(reliefEnd),
                        description: 'Incident occurred at ' + loc + '. Relief provided by ' + pick(STAFF).firstName +
                            '.',
                    }
                });
            }

            // Sort by date descending
            records.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
            return records;
        }

        // ============================================================
        //  2.  STATE
        // ============================================================

        let allRecords = generateRecords(120);
        let filteredRecords = [...allRecords];
        let currentView = 'grouped';
        let currentModalRecord = null;

        //  3.  DOM REFS
        // ============================================================

        const filterDateFrom = $('filterDateFrom');

/ ============================================================
        //  4.  POPULATE FILTER DROPDOWNS
        // ============================================================

        function populateDepartmentFilter() {
            const depts = [...new Set(allRecords.map(r => r.department))].sort();
            filterDepartment.innerHTML = '<option value="">All Departments</option>';
            depts.forEach(d => {
                filterDepartment.innerHTML += `<option value="${d}">${d}</option>`;
            });
        }
        populateDepartmentFilter();

        // ============================================================
        //  5.  FILTER LOGIC
        // ============================================================

        function applyFilters() {
            const type = reportType.value;
            const shift = filterShift.value;
            const location = filterLocation.value;
            const dept = filterDepartment.value;
            const from = filterDateFrom.value;
            const to = filterDateTo.value;

            filteredRecords = allRecords.filter(r => {
                if (type !== 'all' && r.type !== type) return false;
                if (shift && r.shift !== shift) return false;
                if (location && r.location !== location) return false;
                if (dept && r.department !== dept) return false;
                if (from && r.date < from) return false;
                if (to && r.date > to) return false;
                return true;
            });
            render();
        }

        function resetFilters() {
            reportType.value = 'all';
            filterShift.value = '';
            filterLocation.value = '';
            filterDepartment.value = '';
            filterDateFrom.value = '';
            filterDateTo.value = '';
            filteredRecords = [...allRecords];
            render();
        }

        // ============================================================
        //  6.  RENDER
        // ============================================================

        function render() {
            updateStats();
            updateReportCount();
            if (currentView === 'grouped') {
                renderGrouped();
            } else {
                renderTable();
            }
        }

        function updateStats() {
            const total = filteredRecords.length;
            const passIssued = filteredRecords.filter(r => r.type === 'pass' && r.status === 'issued').length;
            const visitors = filteredRecords.filter(r => r.type === 'visitor').length;
            const staffIn = filteredRecords.filter(r => r.type === 'staff' && r.status === 'in').length;
            const incidents = filteredRecords.filter(r => r.type === 'incident').length;
            statTotal.textContent = total;
            statPassIssued.textContent = passIssued;
            statVisitors.textContent = visitors;
            statStaffIn.textContent = staffIn;
            statIncidents.textContent = incidents;
        }

        function updateReportCount() {
            reportCount.textContent = filteredRecords.length + ' Records';
        }

        // ---------- GROUPED (TREE) VIEW ----------
        function renderGrouped() {
            groupedContainer.style.display = 'block';
            tableContainer.style.display = 'none';

            if (filteredRecords.length === 0) {
                groupedContainer.innerHTML = `
              <div class="empty-state">
                <div class="big-icon">📭</div>
                <h3>No records match your filters</h3>
                <p>Try adjusting the filters above.</p>
              </div>
            `;
                return;
            }

            // Build hierarchy: location -> department -> unit -> list of records
            const tree = {};
            filteredRecords.forEach(r => {
                const loc = r.location;
                const dept = r.department;
                const unit = r.unit || 'General';
                if (!tree[loc]) tree[loc] = {};
                if (!tree[loc][dept]) tree[loc][dept] = {};
                if (!tree[loc][dept][unit]) tree[loc][dept][unit] = [];
                tree[loc][dept][unit].push(r);
            });

            // Render recursively
            let html = '';
            for (const [loc, depts] of Object.entries(tree)) {
                html += `<div class="group-node">`;
                html +=
                `<div class="node-header" onclick="toggleNode(this)"><span class="icon">📍</span><span class="label">${loc}</span><span class="count">${Object.values(depts).reduce((acc, u) => acc + Object.values(u).reduce((a, arr) => a + arr.length, 0), 0)}</span><button class="expand-btn">▼</button></div>`;
                html += `<div class="node-children" style="display:block;">`;
                for (const [dept, units] of Object.entries(depts)) {
                    html += `<div class="group-node">`;
                    html +=
                    `<div class="node-header" onclick="toggleNode(this)"><span class="icon">🏢</span><span class="label">${dept}</span><span class="count">${Object.values(units).reduce((a, arr) => a + arr.length, 0)}</span><button class="expand-btn">▼</button></div>`;
                    html += `<div class="node-children" style="display:block;">`;
                    for (const [unit, records] of Object.entries(units)) {
                        html += `<div class="group-node">`;
                        html +=
                        `<div class="node-header" onclick="toggleNode(this)"><span class="icon">👥</span><span class="label">${unit}</span><span class="count">${records.length}</span><button class="expand-btn">▼</button></div>`;
                        html += `<div class="leaf-list" style="display:block;">`;
                        records.forEach(r => {
                            const statusMap = {
                                'issued': 'Issued',
                                'returned': 'Returned',
                                'notreturned': 'Not Returned',
                                'closed': 'Closed',
                                'in': 'Check-In',
                                'out': 'Check-Out',
                                'checked-in': 'Checked-In',
                                'reported': 'Reported'
                            };
                            const statusLabel = statusMap[r.status] || r.status;
                            html += `
                        <div class="leaf-item" onclick="openModal('${r.id}')" style="cursor:pointer;">
                          <span><strong>${r.staffName || 'Visitor'}</strong> ${r.type === 'visitor' ? '(Visitor)' : ''} <span style="color:#6b7d98;">${r.date} ${r.time}</span></span>
                          <span class="detail">${r.type} · ${statusLabel}</span>
                        </div>
                      `;
                        });
                        html += `</div>`;
                        html += `</div>`;
                    }
                    html += `</div>`;
                    html += `</div>`;
                }
                html += `</div>`;
                html += `</div>`;
            }
            groupedContainer.innerHTML = html;
        }

        // Toggle expand/collapse
        window.toggleNode = function(header) {
            const children = header.nextElementSibling;
            if (children) {
                const isHidden = children.style.display === 'none';
                children.style.display = isHidden ? 'block' : 'none';
                const btn = header.querySelector('.expand-btn');
                if (btn) btn.textContent = isHidden ? '▼' : '▶';
            }
        };

        // ---------- TABLE VIEW ----------
        function renderTable() {
            groupedContainer.style.display = 'none';
            tableContainer.style.display = 'block';

            if (filteredRecords.length === 0) {
                tableBody.innerHTML = '';
                tableEmpty.style.display = 'block';
                return;
            }
            tableEmpty.style.display = 'none';

            let html = '';
            filteredRecords.forEach((r, idx) => {
                const statusMap = {
                    'issued': 'Issued',
                    'returned': 'Returned',
                    'notreturned': 'Not Returned',
                    'closed': 'Closed',
                    'in': 'Check-In',
                    'out': 'Check-Out',
                    'checked-in': 'Checked-In',
                    'reported': 'Reported'
                };
                const statusLabel = statusMap[r.status] || r.status;
                const typeLabel = { pass: 'Pass', visitor: 'Visitor', staff: 'Staff', incident: 'Incident' } [r.type] || r
                    .type;
                html += `
              <tr class="clickable" onclick="openModal('${r.id}')">
                <td>${r.id}</td>
                <td>${typeLabel}</td>
                <td><strong>${r.staffName || 'Visitor'}</strong></td>
                <td>${r.department}</td>
                <td>${r.location}</td>
                <td>${r.shift}</td>
                <td>${r.date}<br><span style="font-size:12px;color:#6b7d98;">${r.time}</span></td>
                <td><span class="badge-status ${r.status}">${statusLabel}</span></td>
                <td style="text-align:center;">
                  <button class="btn btn-sm btn-pdf" onclick="event.stopPropagation();exportSinglePdf('${r.id}')">📄 PDF</button>
                </td>
              </tr>
            `;
            });
            tableBody.innerHTML = html;
        }

        // ============================================================
        //  7.  MODAL
        // ============================================================

        window.openModal = function(id) {
            const record = filteredRecords.find(r => r.id === id);
            if (!record) return;
            currentModalRecord = record;
            modalTitle.textContent = `Record #${record.id} — ${record.type.toUpperCase()}`;

            <div class="detail-row"><span class="label">Type</span><span class="value">${record.type}</span></div>
            <div class="detail-row"><span class="label">Staff/Visitor</span><span class="value">${record.staffName || 'N/A'}</span></div>
            <div class="detail-row"><span class="label">Department</span><span class="value">${record.department}</span></div>

        // ============================================================
        //  8.  PDF EXPORT
        // ============================================================

        function generatePdfFromElement(element, filename = 'report.pdf') {
            const { jsPDF } = window.jspdf;
            html2canvas(element, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff',
                logging: false,
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                let heightLeft = pdfHeight;
                let position = 0;

                pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
                heightLeft -= pdf.internal.pageSize.getHeight();

                while (heightLeft > 0) {
                    position = heightLeft - pdfHeight;
                    pdf.addPage();
                    pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
                    heightLeft -= pdf.internal.pageSize.getHeight();
                }
                pdf.save(filename);
            }).catch(err => {
                alert('Could not generate PDF. Please try again.');
                console.error(err);
            });
        }

        window.exportSinglePdf = function(id) {

            <p><strong>ID:</strong> ${record.id}</p>

            document.body.appendChild(div);
