<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Documents Monthly Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body data-report-type="security">
    <main class="app">
        <!-- <header class="header" id="reportHeader"></header> -->

        <!-- HEADER -->
        <header class="header no-print">
            <div class="header-brand">
                <h1 class="header-title">Physical Security Reporting <span>Dashboard</span></h1>
                <p class="header-subtitle">Prototype shell aligned with monthly report pages.</p>
            </div>
            <nav class="header-links" aria-label="Report links">
                <a href="index.html">Dashboard Home</a>
                <a href="material-search-escort.html">1. Material Search/Escort</a>
                <a href="cbn-evacuation.html">2. CBN Evacuation</a>
                <a class="active" href="security-documents.html">3. Security Documents</a>
            </nav>
        </header>

        <section class="report-title-wrap">
            <h2 id="reportTitle" class="report-title"></h2>
        </section>

        <div class="no-print" style="display:flex;justify-content:flex-end;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px;">
            <button class="btn btn-pdf btn-sm" id="exportPdfAll">📄 Export Monthly PDF</button>
        </div>

        <section class="filters no-print">
            <div class="filter-group">
                <label for="monthFilter">Month</label>
                <input id="monthFilter" type="month" value="2026-06" />
            </div>
            <div class="filter-group">
                <label for="locationFilter">Location</label>
                <select id="locationFilter">
                    <option value="">All Locations</option>
                    <option value="Abuja Factory">Abuja Factory</option>
                    <option value="Lagos Annex">Lagos Annex</option>
                </select>
            </div>
        </section>

        <section class="stats" id="summaryCards"></section>

        <section class="table-wrap">
            <div class="table-scroll">
                <table>
                    <thead id="reportHead"></thead>
                    <tbody id="reportBody"></tbody>
                </table>
            </div>
        </section>

        <div class="empty-state" id="emptyState" hidden>
            <div class="big-icon">📭</div>
            <h3>No records found for the selected filters.</h3>
        </div>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="modalTitle">Report Entry Details</h2>
                    <button class="close-btn" id="modalClose">&times;</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer no-print">
                    <button class="btn btn-outline" id="modalCloseBtn">Close</button>
                </div>
            </div>
        </div>
    </main>
    <script src="reports.js"></script>
</body>
</html>
